name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install -e . pytest

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: python -m pip install --upgrade pip build && python -m build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  windows-portable:
    name: Build Windows portable app
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel pyinstaller && python -m pip install -e .

      - name: Build portable app
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --windowed
          --name rclone-sync-manager
          --collect-all PySide6
          --collect-data rclone_sync_manager
          rclone_sync_manager\__main__.py

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\rclone-sync-manager\* -DestinationPath dist\rclone-sync-manager-windows-portable.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rclone-sync-manager-windows-portable
          path: dist/rclone-sync-manager-windows-portable.zip

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [python-package, windows-portable]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
