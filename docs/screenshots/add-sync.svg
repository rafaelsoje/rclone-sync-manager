<svg xmlns="http://www.w3.org/2000/svg" width="640" height="620" viewBox="0 0 640 620" role="img" aria-labelledby="title desc">
  <title id="title">Rclone Sync Manager add sync screenshot</title>
  <desc id="desc">Sanitized mock screenshot using sample sync data.</desc>
  <style>
    text { font-family: Segoe UI, Arial, sans-serif; fill: #f8fafc; font-size: 14px; }
    .bg { fill: #303030; }
    .panel { fill: #3a3a3a; stroke: #555555; }
    .input { fill: #202020; stroke: #555555; }
    .button { fill: #3f3f46; stroke: #71717a; }
    .tab { fill: #3f3f46; stroke: #71717a; }
    .tab-active { fill: #303030; stroke: #71717a; }
  </style>
  <rect class="bg" width="640" height="620" rx="8"/>
  <text x="18" y="28" font-size="16" font-weight="600">Adicionar sincronizacao</text>
  <rect class="tab-active" x="18" y="46" width="64" height="28" rx="4"/><text x="30" y="65">Basico</text>
  <rect class="tab" x="86" y="46" width="78" height="28" rx="4"/><text x="100" y="65">Execucao</text>
  <rect class="tab" x="168" y="46" width="64" height="28" rx="4"/><text x="185" y="65">Filtros</text>
  <rect class="tab" x="236" y="46" width="82" height="28" rx="4"/><text x="250" y="65">Avancado</text>
  <rect class="panel" x="18" y="76" width="604" height="470"/>
  <text x="34" y="112">Nome</text><rect class="input" x="160" y="94" width="440" height="28" rx="4"/><text x="172" y="113">Projetos</text>
  <text x="34" y="152">Pasta local</text><rect class="input" x="160" y="134" width="342" height="28" rx="4"/><text x="172" y="153">C:/Users/demo/Documents/Projetos</text><rect class="button" x="514" y="134" width="86" height="28" rx="4"/><text x="532" y="153">Escolher</text>
  <text x="34" y="192">Selecionar remote</text><rect class="button" x="160" y="174" width="90" height="28" rx="4"/><text x="178" y="193">drive:</text><rect class="input" x="260" y="174" width="242" height="28" rx="4"/><text x="272" y="193">Projetos</text><rect class="button" x="514" y="174" width="86" height="28" rx="4"/><text x="532" y="193">Navegar</text>
  <text x="34" y="232">Remote rclone</text><rect class="input" x="160" y="214" width="440" height="28" rx="4"/><text x="172" y="233">drive:Projetos</text>
  <text x="34" y="272">Modo</text><rect class="input" x="160" y="254" width="440" height="28" rx="4"/><text x="172" y="273">copy</text>
  <text x="34" y="312">Direcao</text><rect class="input" x="160" y="294" width="440" height="28" rx="4"/><text x="172" y="313">Remote -&gt; Local</text>
  <rect class="button" x="456" y="570" width="78" height="30" rx="4"/><text x="482" y="590">Save</text>
  <rect class="button" x="544" y="570" width="78" height="30" rx="4"/><text x="562" y="590">Cancel</text>
</svg>
