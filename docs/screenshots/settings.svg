<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640" role="img" aria-labelledby="title desc">
  <title id="title">Rclone Sync Manager settings screenshot</title>
  <desc id="desc">Sanitized mock screenshot using sample settings and remotes.</desc>
  <style>
    text { font-family: Segoe UI, Arial, sans-serif; fill: #f8fafc; font-size: 14px; }
    .bg { fill: #303030; }
    .input { fill: #202020; stroke: #555555; }
    .button { fill: #3f3f46; stroke: #71717a; }
  </style>
  <rect class="bg" width="720" height="640" rx="8"/>
  <text x="18" y="28" font-size="16" font-weight="600">Configuracoes</text>
  <text x="24" y="72">Caminho do rclone</text><rect class="input" x="170" y="52" width="520" height="28" rx="4"/><text x="182" y="71">rclone</text>
  <text x="24" y="112">Maximo de sincronizacoes paralelas</text><rect class="input" x="300" y="92" width="390" height="28" rx="4"/><text x="312" y="111">1</text>
  <text x="24" y="152">Notificacoes desktop</text><rect x="300" y="134" width="16" height="16" fill="#4ade80"/>
  <text x="24" y="192">Iniciar com o sistema</text><rect x="300" y="174" width="16" height="16" fill="#202020" stroke="#777777"/>
  <text x="24" y="232">Tema</text><rect class="input" x="170" y="212" width="520" height="28" rx="4"/><text x="182" y="231">system</text>
  <text x="24" y="272">Diretorio de logs</text><rect class="input" x="170" y="252" width="520" height="28" rx="4"/><text x="182" y="271">C:/Users/demo/AppData/Local/rclone-sync-manager/logs</text>
  <text x="24" y="312">Diretorio de estado</text><rect class="input" x="170" y="292" width="520" height="28" rx="4"/><text x="182" y="311">C:/Users/demo/AppData/Local/rclone-sync-manager/state</text>
  <text x="24" y="352">Autostart</text><rect class="input" x="170" y="332" width="520" height="28" rx="4"/><text x="182" y="351">Inativo: Startup/rclone-sync-manager.bat</text>
  <rect class="button" x="24" y="382" width="120" height="28" rx="4"/><text x="38" y="401">Recriar autostart</text>
  <rect class="button" x="154" y="382" width="84" height="28" rx="4"/><text x="170" y="401">Abrir pasta</text>
  <rect class="button" x="248" y="382" width="90" height="28" rx="4"/><text x="264" y="401">Abrir logs</text>
  <rect class="input" x="24" y="430" width="666" height="118"/>
  <text x="350" y="452">Remote</text>
  <text x="40" y="486">drive:</text>
  <text x="40" y="516">backup:</text>
  <rect class="button" x="24" y="570" width="150" height="28" rx="4"/><text x="38" y="589">Adicionar/editar remote</text>
  <rect class="button" x="184" y="570" width="120" height="28" rx="4"/><text x="202" y="589">Remover remote</text>
  <rect class="button" x="314" y="570" width="120" height="28" rx="4"/><text x="330" y="589">Atualizar remotes</text>
</svg>
